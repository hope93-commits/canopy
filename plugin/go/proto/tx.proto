syntax = "proto3";

package types;

option go_package = "github.com/hope93-commits/canopy/plugin/go/contract";

// MessagePublishContent: creator publishes a piece of work on-chain
message MessagePublishContent {
  bytes  creator_address = 1 [json_name="creatorAddress", (gogoproto.jsontag) = "creatorAddress,omitempty"];
  string title           = 2 [json_name="title"];
  string content_hash    = 3 [json_name="contentHash"];   // IPFS CID or sha256
  string license_terms   = 4 [json_name="licenseTerms"];
  uint64 price_ufrg      = 5 [json_name="priceUfrg"];     // price in micro-FRG (0 = free)
  string content_type    = 6 [json_name="contentType"];   // article|image|audio|video|dataset|other
  string description     = 7 [json_name="description"];
}

// MessagePurchaseLicense: buyer pays creator and records a license on-chain
message MessagePurchaseLicense {
  bytes  buyer_address = 1 [json_name="buyerAddress"];
  uint64 content_id    = 2 [json_name="contentId"];
  uint64 amount_ufrg   = 3 [json_name="amountUfrg"];
}

// MessageTipCreator: send a direct FRG tip to any creator
message MessageTipCreator {
  bytes  sender_address  = 1 [json_name="senderAddress"];
  bytes  creator_address = 2 [json_name="creatorAddress"];
  uint64 amount_ufrg     = 3 [json_name="amountUfrg"];
  string message         = 4 [json_name="message"];
}







